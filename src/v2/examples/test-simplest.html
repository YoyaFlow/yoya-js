<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>最简单测试</title>
</head>
<body>
  <h1>最简单测试</h1>
  <pre id="output"></pre>
  <script type="module">
    const output = document.getElementById('output');
    const log = (msg) => {
      output.textContent += msg + '\n';
      console.log(msg);
    };

    log('1. 开始');

    try {
      log('2. 导入 basic.js 中的 Tag...');
      const { Tag } = await import('/yoya/core/basic.js');
      log('3. Tag 导入成功：' + typeof Tag);

      log('4. 创建 Tag 实例...');
      const tag = new Tag('div');
      log('5. Tag 实例创建成功：' + tag.constructor.name);
    } catch (e) {
      log('ERROR: ' + e.message);
      log('Stack: ' + e.stack);
    }

    log('完成');
  </script>
</body>
</html>
