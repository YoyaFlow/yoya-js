<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简单测试</title>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    console.log('1. 脚本开始');

    // 直接导入 interaction 页面模块
    try {
      const interaction = await import('/v2/examples/pages/Interaction/index.js');
      console.log('2. Interaction 导入成功');
      console.log('   keys:', Object.keys(interaction));

      const page = interaction.createInteractionPage();
      console.log('3. 页面创建成功:', typeof page);

      page.bindTo('#app');
      console.log('4. 页面绑定成功');
    } catch (e) {
      console.error('错误:', e.message);
      console.error('堆栈:', e.stack);
    }

    console.log('5. 脚本完成');
  </script>
</body>
</html>
