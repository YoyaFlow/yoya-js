<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>测试导入</title>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    console.log('1. 开始');

    try {
      console.log('2. 正在导入 yoya/index.js...');
      const yoya = await import('/yoya/index.js');
      console.log('3. 导入成功，keys:', Object.keys(yoya).length);
    } catch (e) {
      console.error('4. 导入失败:', e.message);
      console.error('Stack:', e.stack);
    }

    console.log('5. 完成');
  </script>
</body>
</html>
