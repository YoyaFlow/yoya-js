<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya.Basic - 组件主题测试</title>
  <style>
    body {
      padding: 40px;
      font-family: sans-serif;
    }
    .section {
      margin-bottom: 40px;
    }
    .section h2 {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--yoya-border, #e0e0e0);
    }
    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      align-items: center;
    }
    .label {
      min-width: 100px;
      color: var(--yoya-text-secondary, #666);
    }
  </style>
</head>
<body>
  <h1>Yoya.Basic - 组件主题测试</h1>

  <div class="section">
    <h2>主题切换</h2>
    <div class="row">
      <span class="label">切换模式:</span>
      <div id="theme-switcher"></div>
      <span id="current-mode" style="margin-left: 16px;"></span>
    </div>
  </div>

  <div class="section">
    <h2>Button 按钮</h2>
    <div class="row">
      <span class="label">类型:</span>
      <div id="btn-types"></div>
    </div>
    <div class="row">
      <span class="label">Ghost:</span>
      <div id="btn-ghost"></div>
    </div>
  </div>

  <div class="section">
    <h2>Menu 菜单</h2>
    <div class="row">
      <span class="label">垂直菜单:</span>
      <div id="menu-vertical"></div>
    </div>
  </div>

  <div class="section">
    <h2>Card 卡片</h2>
    <div id="cards"></div>
  </div>

  <script type="module" src="./components-test.js"></script>
</body>
</html>
