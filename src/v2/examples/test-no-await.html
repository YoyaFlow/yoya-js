<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>无 await 测试</title>
</head>
<body>
  <h1>无 await 测试</h1>
  <pre id="output"></pre>
  <script type="module">
    const output = document.getElementById('output');
    const log = (msg) => {
      output.textContent += msg + '\n';
      console.log(msg);
    };

    log('1. 开始');

    // 不使用 await，使用 .then()
    import('/yoya/core/basic.js')
      .then(mod => {
        log('2. basic.js 加载成功，keys: ' + Object.keys(mod).length);
        const { Tag } = mod;
        log('3. Tag 类型：' + typeof Tag);

        const tag = new Tag('div');
        log('4. Tag 实例创建成功：' + tag.constructor.name);
      })
      .catch(err => {
        log('ERROR: ' + err.message);
        log('Stack: ' + err.stack);
      });

    log('完成（异步加载中）');
  </script>
</body>
</html>
