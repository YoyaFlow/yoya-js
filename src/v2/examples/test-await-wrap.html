<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>await 测试</title>
</head>
<body>
  <h1>await 测试</h1>
  <pre id="output"></pre>
  <script type="module">
    const output = document.getElementById('output');
    const log = (msg) => {
      output.textContent += msg + '\n';
      console.log(msg);
    };

    (async () => {
      log('1. 开始');

      try {
        log('2. 导入 basic.js...');
        const { Tag } = await import('/yoya/core/basic.js');
        log('3. Tag 类型：' + typeof Tag);

        log('4. 创建 Tag 实例...');
        const tag = new Tag('div');
        log('5. Tag 实例创建成功：' + tag.constructor.name);
      } catch (e) {
        log('ERROR: ' + e.message);
        log('Stack: ' + e.stack);
      }

      log('完成');
    })();
  </script>
</body>
</html>
