<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>调试导入</title>
</head>
<body>
  <h1>调试导入</h1>
  <pre id="output"></pre>
  <script type="module">
    const output = document.getElementById('output');
    const log = (msg) => {
      output.textContent += msg + '\n';
      console.log(msg);
    };

    try {
      log('1. 开始导入 basic.js...');
      const basic = await import('/yoya/core/basic.js');
      log('2. basic.js 成功，keys: ' + Object.keys(basic).length);
    } catch (e) {
      log('ERROR in basic.js: ' + e.message);
      log('Stack: ' + e.stack);
    }

    try {
      log('3. 开始导入 theme.js...');
      const theme = await import('/yoya/core/theme.js');
      log('4. theme.js 成功，keys: ' + Object.keys(theme).length);
    } catch (e) {
      log('ERROR in theme.js: ' + e.message);
    }

    try {
      log('5. 开始导入 layout.js...');
      const layout = await import('/yoya/core/layout.js');
      log('6. layout.js 成功，keys: ' + Object.keys(layout).length);
    } catch (e) {
      log('ERROR in layout.js: ' + e.message);
    }

    try {
      log('7. 开始导入 svg.js...');
      const svg = await import('/yoya/core/svg.js');
      log('8. svg.js 成功，keys: ' + Object.keys(svg).length);
    } catch (e) {
      log('ERROR in svg.js: ' + e.message);
    }

    try {
      log('9. 开始导入 components/index.js...');
      const components = await import('/yoya/components/index.js');
      log('10. components/index.js 成功，keys: ' + Object.keys(components).length);
    } catch (e) {
      log('ERROR in components/index.js: ' + e.message);
      log('Stack: ' + e.stack);
    }

    try {
      log('11. 开始导入 icons.js...');
      const icons = await import('/yoya/core/icons.js');
      log('12. icons.js 成功，keys: ' + Object.keys(icons).length);
    } catch (e) {
      log('ERROR in icons.js: ' + e.message);
    }

    try {
      log('13. 开始导入 yoya/index.js...');
      const yoya = await import('/yoya/index.js');
      log('14. yoya/index.js 成功，keys: ' + Object.keys(yoya).length);
    } catch (e) {
      log('ERROR in yoya/index.js: ' + e.message);
      log('Stack: ' + e.stack);
    }

    log('完成');
  </script>
</body>
</html>
