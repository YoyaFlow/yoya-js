<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拖拽组件演示 - YoyaJS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #303133;
    }

    h2 {
      margin: 30px 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e4e7ed;
      color: #303133;
    }

    .demo-section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    .demo-description {
      color: #909399;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* 基础拖拽演示样式 */
    .draggable-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 20px;
    }

    .droppable-container {
      position: relative;
      width: 300px;
      height: 200px;
      margin: 20px;
    }

    .draggable-box {
      width: 150px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      cursor: grab;
      position: absolute;
      left: 20px;
      top: 20px;
      transition: opacity 0.15s ease;
    }

    .draggable-box.drag-ghost {
      opacity: 0.8;
      z-index: 9999;
    }

    .drop-zone {
      width: 300px;
      height: 200px;
      border: 2px dashed #dcdfe6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #909399;
      background: #fafafa;
      margin: 20px;
      transition: all 0.2s ease;
    }

    .drop-zone.over {
      border-color: #409eff;
      background: rgba(64, 158, 255, 0.1);
    }

    /* 排序列表演示样式 */
    .sort-list {
      max-width: 400px;
    }

    .sort-item {
      padding: 16px 20px;
      background: white;
      border: 1px solid #e4e7ed;
      border-radius: 4px;
      margin-bottom: 8px;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .sort-item:hover {
      background: #f5f7fa;
    }

    .sort-item .drag-icon {
      color: #c0c4cc;
      font-size: 18px;
    }

    .sort-item .item-content {
      flex: 1;
    }

    /* 占位符样式 - 插入位置标识线 */
    .sort-placeholder {
      height: 4px;
      background: #409eff;
      border-radius: 2px;
      margin: 0;
      transition: all 0.15s ease;
      box-shadow: 0 0 10px rgba(64, 158, 255, 0.8);
      position: relative;
    }

    /* 占位符上的箭头标识 */
    .sort-placeholder::before {
      content: '';
      position: absolute;
      left: 10px;
      top: -8px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 8px solid #409eff;
      filter: drop-shadow(0 0 4px rgba(64, 158, 255, 0.8));
    }

    /* Ghost 元素样式 */
    .drag-ghost {
      opacity: 0.8 !important;
      transform: scale(1.05) !important;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15) !important;
      pointer-events: none !important;
      z-index: 9999 !important;
      transition: transform 0.1s ease !important;
    }

    /* 拖拽中的原元素样式 */
    .draggable-box.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .sort-item.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    /* 输出区域 */
    .output-area {
      margin-top: 20px;
      padding: 16px;
      background: #2d2d2d;
      border-radius: 4px;
      color: #a0a0a0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 200px;
      overflow-y: auto;
    }

    .output-area .log-entry {
      margin-bottom: 4px;
    }

    .output-area .log-entry.success {
      color: #67c23a;
    }

    .output-area .log-entry.info {
      color: #409eff;
    }

    .output-area .log-entry.warning {
      color: #e6a23c;
    }
  </style>
</head>
<body>
  <h1>🎯 拖拽组件演示</h1>

  <!-- 基础拖拽演示 -->
  <div class="demo-section">
    <h2>1. 基础拖拽 (VDraggable + VDroppable)</h2>
    <p class="demo-description">拖拽左侧的紫色方块到右侧的虚线区域</p>
    <div style="display: flex; gap: 20px;">
      <div id="draggable-container" class="draggable-container"></div>
      <div id="droppable-container" class="droppable-container"></div>
    </div>
  </div>

  <!-- 拖拽排序演示 -->
  <div class="demo-section">
    <h2>2. 拖拽排序 (VDragSortList)</h2>
    <p class="demo-description">拖拽列表项改变顺序</p>
    <div id="sort-list-container"></div>
  </div>

  <!-- 输出日志 -->
  <div class="demo-section">
    <h2>📋 事件日志</h2>
    <div id="output-area" class="output-area"></div>
  </div>

  <script type="module">
    import {
      vDraggable,
      vDroppable,
      vDragSortList,
      div
    } from '/yoya/index.js';

    // 日志输出工具
    const outputArea = document.getElementById('output-area');
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      outputArea.appendChild(entry);
      outputArea.scrollTop = outputArea.scrollHeight;
    }

    // ============================================
    // 演示 1: 基础拖拽
    // ============================================
    const draggableBox = vDraggable(d => {
      d.className('draggable-box');
      d.data({ type: 'demo-box', name: '紫色方块' });
      d.text('拖拽我');
      d.onDragStart((e) => {
        log(`拖拽开始：${e.data?.name}`, 'info');
      });
      d.onDrag((e) => {
        log(`拖拽中：x=${e.x}, y=${e.y}`, 'info');
      });
      d.onDragEnd((e) => {
        log(`拖拽结束：${e.data?.name}`, 'success');
      });
    });

    const dropZone = vDroppable(d => {
      d.className('drop-zone');
      d.text('放置到这里');
      d.accept(['demo-box']);
      d.onDragEnter((e) => {
        log(`拖拽进入：${e.data?.name}`, 'info');
        e.target.classList.add('over');
      });
      d.onDragLeave((e) => {
        log(`拖拽离开`, 'info');
        e.target.classList.remove('over');
      });
      d.onDrop((e) => {
        log(`放置成功：${e.data?.name}`, 'success');
        e.target.classList.remove('over');
        // 将 draggable-box 移动到 droppable-container
        const draggableEl = document.querySelector('.draggable-box');
        if (draggableEl) {
          e.target.appendChild(draggableEl);
          // 重置 transform
          draggableEl.style.transform = '';
          draggableEl.style.position = 'static';
        }
      });
    });

    document.getElementById('draggable-container').appendChild(draggableBox.renderDom());
    document.getElementById('droppable-container').appendChild(dropZone.renderDom());

    // ============================================
    // 演示 2: 拖拽排序
    // ============================================
    const sortListData = [
      { id: '1', content: '📝 第一项 - 拖拽我改变顺序' },
      { id: '2', content: '📝 第二项 - 拖拽我改变顺序' },
      { id: '3', content: '📝 第三项 - 拖拽我改变顺序' },
      { id: '4', content: '📝 第四项 - 拖拽我改变顺序' },
    ];

    const sortList = vDragSortList(list => {
      list.className('sort-list');
      list.itemKey('id');
      list.itemRender((item, index, container) => {
        container.attr('class', 'sort-item');
        const content = typeof item.content === 'string' ? item.content : String(item.content || item);
        container.text(content);
      });
      list.items(sortListData);
      list.onReorder((e) => {
        log(`列表重排：从 ${e.fromIndex} 移动到 ${e.toIndex}`, 'success');
        const newOrder = e.items.map((item, i) => i + 1).join(' → ');
        log(`新顺序：${newOrder}`, 'info');
      });
    });

    document.getElementById('sort-list-container').appendChild(sortList.renderDom());

    // 初始化日志
    log('拖拽组件演示已加载', 'success');
    log('尝试拖拽左侧的方块到右侧区域', 'info');
    log('拖拽排序列表项改变顺序', 'info');
  </script>
</body>
</html>
