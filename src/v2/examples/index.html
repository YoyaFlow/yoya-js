<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya.Basic V2 - HTML DSL Library</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    #app {
      height: 100%;
    }
    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a1a1a1;
    }
  </style>
  <!-- 统一主题 CSS -->

  <link rel="stylesheet" href="../../yoya/theme/css/components/code.css">
  <link rel="stylesheet" href="../../yoya/theme/css/components/table.css">
  <link rel="stylesheet" href="../../yoya/theme/css/components/field.css">
  <link rel="stylesheet" href="../../yoya/theme/css/components/box.css">
  <link rel="stylesheet" href="../../yoya/theme/css/components/switchers.css">
</head>
<body>

</html>
