<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Test</title>
  <style>
    body {
      background: var(--islands-bg, #f8f9fa);
      color: var(--islands-text, #333);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    .card {
      background: var(--islands-card-bg, white);
      border: 1px solid var(--islands-border, #e0e0e0);
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>主题切换测试</h1>
  
  <div class="card">
    <h2>当前状态</h2>
    <p>currentThemeId: <span id="themeId">-</span></p>
    <p>currentMode: <span id="mode">-</span></p>
    <p>effectiveMode: <span id="effectiveMode">-</span></p>
  </div>
  
  <div class="card">
    <h2>操作</h2>
    <button onclick="switchToLight()">切换到浅色</button>
    <button onclick="switchToDark()">切换到深色</button>
    <button onclick="switchToAuto()">切换到自动</button>
    <button onclick="clearStorage()">清除 localStorage</button>
    <button onclick="reload()">重新加载</button>
  </div>
  
  <div class="card">
    <h2>日志</h2>
    <div class="log" id="log"></div>
  </div>

  <script type="module">
    import { setThemeMode, getThemeMode, getEffectiveThemeMode, getCurrentThemeId } from './yoya/index.js';
    
    const logEl = document.getElementById('log');
    const themeIdEl = document.getElementById('themeId');
    const modeEl = document.getElementById('mode');
    const effectiveModeEl = document.getElementById('effectiveMode');
    
    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log('[Theme Test]', msg);
    }
    
    function updateStatus() {
      themeIdEl.textContent = getCurrentThemeId() || 'null';
      modeEl.textContent = getThemeMode();
      effectiveModeEl.textContent = getEffectiveThemeMode();
    }
    
    window.switchToLight = () => {
      log('Switching to light...');
      setThemeMode('light');
      updateStatus();
    };
    
    window.switchToDark = () => {
      log('Switching to dark...');
      setThemeMode('dark');
      updateStatus();
    };
    
    window.switchToAuto = () => {
      log('Switching to auto...');
      setThemeMode('auto');
      updateStatus();
    };
    
    window.clearStorage = () => {
      localStorage.clear();
      log('localStorage cleared');
    };
    
    window.reload = () => {
      location.reload();
    };
    
    // 监听主题变化
    window.addEventListener('theme-changed', (e) => {
      log(`Theme changed: ${e.detail.theme.name}`);
      updateStatus();
    });
    
    // 初始化
    log('Test page loaded');
    updateStatus();
    log(`Initial state - themeId: ${getCurrentThemeId()}, mode: ${getThemeMode()}, effective: ${getEffectiveThemeMode()}`);
  </script>
</body>
</html>
