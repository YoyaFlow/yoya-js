<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya - UI 组件演示</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 40px 20px;
      margin: 0;
    }
    .demo-container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .demo-section {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .demo-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
      border-bottom: 2px solid #1890ff;
      padding-bottom: 10px;
    }
    .demo-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .demo-label {
      min-width: 100px;
      font-weight: 500;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="demo-container" id="app"></div>
  <script type="module" src="yoya.ui-components.example.js"></script>
</body>
</html>
