<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VField 测试</title>
  <style>
    body { font-family: sans-serif; padding: 50px; background: #667eea; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; }
    .debug { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>VField 测试</h1>
    <p>鼠标悬浮在字段上应显示编辑图标，点击进入编辑模式</p>
    <div id="app"></div>
    <div class="debug" id="debug">调试信息将显示在这里</div>
  </div>

  <script type="module">
    import { vField } from '../yoya/index.js';

    const debug = document.getElementById('debug');
    function log(msg) {
      debug.innerHTML += '<br>' + msg;
      console.log(msg);
    }

    const field = vField(f => {
      f.showContent((container, value) => {
        container.text(value || '点击编辑');
      });
      f.editContent((container, setValue) => {
        container.text('编辑中...');
      });
    });

    document.getElementById('app').appendChild(field._el);

    // 检查状态
    log('1. _editIcon: ' + (field._editIcon ? '存在' : '不存在'));
    log('2. _editIcon._el: ' + (field._editIcon._el ? '存在' : '不存在'));
    log('3. _editIcon._el.style.opacity: ' + field._editIcon._el.style.opacity);
    log('4. _showContainer._events: ' + JSON.stringify(Object.keys(field._showContainer._events)));
    log('5. _showContainer._rendered: ' + field._showContainer._rendered);

    // 手动调用 mouseenter 处理函数
    const handler = field._showContainer._events.mouseenter[0];
    log('6. 调用 handler 前 opacity: ' + field._editIcon._el.style.opacity);
    handler.call(field);  // 显式绑定 this
    log('7. 调用 handler 后 opacity: ' + field._editIcon._el.style.opacity);
  </script>
</body>
</html>
