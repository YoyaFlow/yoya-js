<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VTree 树形组件演示</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }
    .demo-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 30px;
      margin-bottom: 20px;
    }
    .demo-title {
      font-size: 1.25rem;
      color: #333;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .demo-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
    }
    .demo-desc {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    .state-display {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 0.85rem;
    }
    .state-display h4 {
      color: #666;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }
    .state-value {
      color: #333;
      word-break: break-all;
    }
    .empty-state {
      color: #999;
      font-style: italic;
    }
    .yoya-tree {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>VTree 树形组件</h1>
      <p>声明式 HTML DSL · 虚拟元素架构 · 状态驱动</p>
    </div>

    <div class="demo-card" id="demo1">
      <div class="demo-title">基础树形结构</div>
      <p class="demo-desc">支持节点展开/收起、选中、复选框级联勾选</p>

      <div class="action-bar" id="actionBar1"></div>
      <div id="tree1"></div>

      <div class="state-display">
        <h4>当前选中节点 (selectedKeys):</h4>
        <div class="state-value" id="selectedState1">
          <span class="empty-state">暂无选中节点</span>
        </div>
        <h4 style="margin-top: 12px;">当前勾选节点 (checkedKeys):</h4>
        <div class="state-value" id="checkedState1">
          <span class="empty-state">暂无勾选节点</span>
        </div>
      </div>
    </div>

    <div class="demo-card" id="demo2">
      <div class="demo-title">单选模式</div>
      <p class="demo-desc">只能选中一个节点，再次点击其他节点会切换选中状态</p>

      <div id="tree2"></div>

      <div class="state-display">
        <h4>当前选中节点:</h4>
        <div class="state-value" id="selectedState2">
          <span class="empty-state">暂无选中节点</span>
        </div>
      </div>
    </div>

    <div class="demo-card" id="demo3">
      <div class="demo-title">自定义节点内容</div>
      <p class="demo-desc">节点标题可以是任意 HTML 元素</p>

      <div id="tree3"></div>
    </div>
  </div>

  <script type="module" src="yoya.vtree.example.js"></script>
</body>
</html>
