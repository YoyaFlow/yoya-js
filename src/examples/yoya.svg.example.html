<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya.Basic - SVG 演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      padding: 20px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      #app {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module" src="./yoya.svg.example.js"></script>
</body>
</html>
