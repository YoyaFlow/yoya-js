<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBox 组件测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { vBox, vCard, vButton, toast } from '../../yoya/index.js';

    // 演示页面布局
    vBox(app => {
      app.styles({
        minHeight: '100vh',
      });

      // 标题
      app.vBox(title => {
        title.text('VBox 组件测试');
        title.styles({
          fontSize: '24px',
          fontWeight: 'bold',
          marginBottom: '20px',
          textAlign: 'center',
        });
      });

      // 1. 基础透明 Box
      app.vBox(section1 => {
        section1.margin('lg');
        section1.vBox(box => {
          box.styles({ border: '1px dashed #999' });
          box.padding('lg');
          box.text('1. 基础透明 Box - 完全透明，继承父元素字体颜色');
        });
      });

      // 2. 带背景色的 Box
      app.vBox(section2 => {
        section2.margin('lg');
        section2.vBox(box => {
          box.background('var(--yoya-primary)');
          box.color('#ffffff');
          box.padding('lg');
          box.radius('md');
          box.text('2. 带背景色的 Box - 使用主题变量作为背景色');
        });
      });

      // 3. 带阴影的 Box
      app.vBox(section3 => {
        section3.margin('lg');
        section3.vBox(box => {
          box.background('#ffffff');
          box.shadow('md');
          box.padding('lg');
          box.radius('lg');
          box.text('3. 带阴影的 Box - 使用预设阴影级别 (sm/md/lg/xl)');
        });
      });

      // 4. 半透明背景 Box
      app.vBox(section4 => {
        section4.margin('lg');
        section4.vBox(box => {
          box.background('var(--yoya-primary)');
          box.opacity(0.1);
          box.padding('lg');
          box.radius('md');
          box.text('4. 半透明背景 Box - opacity 控制透明度 (0-1)');
        });
      });

      // 5. 带边框的 Box
      app.vBox(section5 => {
        section5.margin('lg');
        section5.vBox(box => {
          box.background('#ffffff');
          box.border();
          box.padding('lg');
          box.radius('md');
          box.text('5. 带边框的 Box - 使用 border() 方法添加边框');
        });
      });

      // 6. 不同圆角大小
      app.vBox(section6 => {
        section6.margin('lg');
        section6.styles({ display: 'flex', gap: '10px' });

        section6.vBox(box1 => {
          box1.background('var(--yoya-success)');
          box1.color('#fff');
          box1.padding('md');
          box1.radius('sm');
          box1.text('圆角 sm');
        });

        section6.vBox(box2 => {
          box2.background('var(--yoya-warning)');
          box2.color('#fff');
          box2.padding('md');
          box2.radius('md');
          box2.text('圆角 md');
        });

        section6.vBox(box3 => {
          box3.background('var(--yoya-error)');
          box3.color('#fff');
          box3.padding('md');
          box3.radius('lg');
          box3.text('圆角 lg');
        });

        section6.vBox(box4 => {
          box4.background('var(--yoya-info)');
          box4.color('#fff');
          box4.padding('md');
          box4.radius('xl');
          box4.text('圆角 xl');
        });
      });

      // 7. 不同背景色
      app.vBox(section7 => {
        section7.margin('lg');
        section7.styles({ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '10px' });

        section7.vBox(box1 => {
          box1.background('var(--yoya-success-bg)');
          box1.color('var(--yoya-success)');
          box1.padding('md');
          box1.radius('md');
          box1.text('成功背景');
        });

        section7.vBox(box2 => {
          box2.background('var(--yoya-warning-bg)');
          box2.color('var(--yoya-warning)');
          box2.padding('md');
          box2.radius('md');
          box2.text('警告背景');
        });

        section7.vBox(box3 => {
          box3.background('var(--yoya-error-bg)');
          box3.color('var(--yoya-error)');
          box3.padding('md');
          box3.radius('md');
          box3.text('错误背景');
        });
      });

      // 8. 不同尺寸
      app.vBox(section8 => {
        section8.margin('lg');
        section8.styles({ display: 'flex', gap: '10px', alignItems: 'center' });

        section8.vBox(box1 => {
          box1.background('var(--yoya-primary)');
          box1.color('#fff');
          box1.padding('xs');
          box1.radius('sm');
          box1.text('padding-xs');
        });

        section8.vBox(box2 => {
          box2.background('var(--yoya-primary)');
          box2.color('#fff');
          box2.padding('sm');
          box2.radius('sm');
          box2.text('padding-sm');
        });

        section8.vBox(box3 => {
          box3.background('var(--yoya-primary)');
          box3.color('#fff');
          box3.padding('md');
          box3.radius('sm');
          box3.text('padding-md');
        });

        section8.vBox(box4 => {
          box4.background('var(--yoya-primary)');
          box4.color('#fff');
          box4.padding('lg');
          box4.radius('sm');
          box4.text('padding-lg');
        });

        section8.vBox(box5 => {
          box5.background('var(--yoya-primary)');
          box5.color('#fff');
          box5.padding('xl');
          box5.radius('sm');
          box5.text('padding-xl');
        });
      });

      // 9. 组合效果
      app.vBox(section9 => {
        section9.margin('lg');
        section9.vCard(card => {
          card.vCardHeader(header => {
            header.text('组合效果演示');
          });
          card.vCardBody(body => {
            body.vBox(content => {
              content.background('var(--yoya-bg-tertiary)');
              content.radius('md');
              content.padding('lg');
              content.margin('md');
              content.text(`
                这是一个组合使用示例：
                - 背景色：var(--yoya-bg-tertiary)
                - 圆角：md
                - 内边距：lg
                - 外边距：md
              `);
            });
          });
          card.vCardFooter(footer => {
            footer.styles({ display: 'flex', justifyContent: 'flex-end', gap: '10px' });
            footer.vButton(btn => {
              btn.text('取消');
              btn.type('default');
            });
            footer.vButton(btn => {
              btn.text('确定');
              btn.type('primary');
              btn.onClick(() => toast.success('操作成功'));
            });
          });
        });
      });

      // 10. 作为布局容器
      app.vBox(section10 => {
        section10.margin('lg');
        section10.vBox(container => {
          container.background('#ffffff');
          container.shadow();
          container.radius('lg');
          container.padding('xl');

          // 内部网格布局
          container.vBox(grid => {
            grid.styles({
              display: 'grid',
              gridTemplateColumns: 'repeat(2, 1fr)',
              gap: '20px',
            });

            grid.vBox(cell1 => {
              cell1.background('var(--yoya-primary-alpha)');
              cell1.radius('md');
              cell1.padding('lg');
              cell1.text('左侧内容区域');
            });

            grid.vBox(cell2 => {
              cell2.background('var(--yoya-success-bg)');
              cell2.radius('md');
              cell2.padding('lg');
              cell2.text('右侧内容区域');
            });
          });
        });
      });
    }).bindTo('#app');
  </script>
</body>
</html>
