<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VField 保存测试</title>
  <style>
    body { font-family: sans-serif; padding: 50px; background: #667eea; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; }
    .debug { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 12px; }
    .result { margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 4px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>VField 保存功能测试</h1>
    <p>点击字段进入编辑模式，修改内容后点击 ✓ 保存</p>
    <div id="app"></div>
    <div class="result" id="result">当前值：-</div>
    <div class="debug" id="debug">调试信息：</div>
  </div>

  <script type="module">
    import { vField, vInput, toast } from '../yoya/index.js';

    const debug = document.getElementById('debug');
    const result = document.getElementById('result');

    function log(msg) {
      debug.innerHTML += '<br>[' + new Date().toLocaleTimeString() + '] ' + msg;
      debug.scrollTop = debug.scrollHeight;
      console.log(msg);
    }

    // 创建 VField 实例
    const field = vField(f => {
      f.placeholder('点击编辑姓名');

      // 显示内容
      f.showContent((container, value) => {
        container.text(value || '暂无姓名');
      });

      // 编辑内容 - 使用 input 输入框
      f.editContent((container, setValue, host) => {
        const input = vInput(i => {
          i.type('text');
          i.value(host.getValue() || '');
          i.placeholder('请输入姓名');
          i.styles({ width: '100%' });
          i.onInput((instance) => {
            const val = instance.value();
            log('onInput 触发：' + val);
            setValue(val);
          });
            const val = instance.value();
            log('onInput 触发：' + val);
            setValue(val);
          });
            log('onInput 触发：' + val);
            setValue(val);
          });
        });
        container.clear();
        container.child(input);
        setTimeout(() => input.focus(), 0);
      });

      // 保存回调
      f.onSave((newValue, oldValue, host) => {
        log('onSave 回调：' + oldValue + ' -> ' + newValue);
        result.textContent = '当前值：' + (newValue || '空');
        toast.success('保存成功：' + newValue);
        return true;
      });

      // 变化回调
      f.onChange((newValue, oldValue, host) => {
        log('onChange 回调：' + oldValue + ' -> ' + newValue);
      });

      // 编辑回调
      f.onEdit((value, host) => {
        log('onEdit 回调，当前值：' + value);
      });
    });

    // 绑定到页面
    document.getElementById('app').appendChild(field._el);

    // 设置初始值
    field.setValue('张三');
    log('初始值已设置为：张三');

    // 显示当前值
    result.textContent = '当前值：张三';
  </script>
</body>
</html>
