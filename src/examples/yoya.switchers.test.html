<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSwitchers 组件测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    .test-section {
      margin-bottom: 24px;
    }
    .test-label {
      font-size: 14px;
      font-weight: 500;
      color: #666;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { vBox, vSwitchers, vCard } from '../../yoya/index.js';

    vBox(app => {
      app.padding('xl');

      // 标题
      app.vBox(title => {
        title.text('VSwitchers 分段控制器测试');
        title.styles({
          fontSize: '24px',
          fontWeight: 'bold',
          marginBottom: '24px',
          textAlign: 'center',
        });
      });

      // 1. 基础用法 - 单选
      app.vBox(section1 => {
        section1.addClass('test-section');
        section1.vBox(label => {
          label.text('1. 基础单选');
          label.addClass('test-label');
        });
        section1.vSwitchers(s => {
          s.options([
            { value: 'day', label: '日' },
            { value: 'week', label: '周' },
            { value: 'month', label: '月' },
          ]);
          s.value('week');
          s.onChange((value) => {
            console.log('单选选中：', value);
          });
        });
      });

      // 2. 字符串简写
      app.vBox(section2 => {
        section2.addClass('test-section');
        section2.vBox(label => {
          label.text('2. 字符串简写');
          label.addClass('test-label');
        });
        section2.vSwitchers(s => {
          s.options(['选项 A', '选项 B', '选项 C']);
          s.value('选项 A');
          s.onChange((value) => {
            console.log('字符串选中：', value);
          });
        });
      });

      // 3. 多选模式
      app.vBox(section3 => {
        section3.addClass('test-section');
        section3.vBox(label => {
          label.text('3. 多选模式');
          label.addClass('test-label');
        });
        section3.vSwitchers(s => {
          s.multiple(true);
          s.options([
            { value: 'apple', label: '苹果' },
            { value: 'banana', label: '香蕉' },
            { value: 'orange', label: '橙子' },
            { value: 'grape', label: '葡萄' },
          ]);
          s.value(['apple', 'orange']);
          s.onChange((values) => {
            console.log('多选选中：', values);
          });
        });
      });

      // 4. 带禁用项
      app.vBox(section4 => {
        section4.addClass('test-section');
        section4.vBox(label => {
          label.text('4. 带禁用项');
          label.addClass('test-label');
        });
        section4.vSwitchers(s => {
          s.options([
            { value: 'opt1', label: '选项 1' },
            { value: 'opt2', label: '选项 2', disabled: true },
            { value: 'opt3', label: '选项 3' },
          ]);
          s.value('opt1');
          s.onChange((value) => {
            console.log('带禁用项选中：', value);
          });
        });
      });

      // 5. 整体禁用
      app.vBox(section5 => {
        section5.addClass('test-section');
        section5.vBox(label => {
          label.text('5. 整体禁用');
          label.addClass('test-label');
        });
        section5.vSwitchers(s => {
          s.options(['选项 A', '选项 B', '选项 C']);
          s.value('选项 A');
          s.disabled(true);
        });
      });

      // 6. 不同尺寸
      app.vBox(section6 => {
        section6.addClass('test-section');
        section6.vBox(label => {
          label.text('6. 不同尺寸');
          label.addClass('test-label');
        });

        // Small
        section6.vSwitchers(s => {
          s.options(['小', '中', '大']);
          s.size('small');
          s.value('小');
        });

        // Medium (默认)
        section6.vSwitchers(s => {
          s.options(['小', '中', '大']);
          s.size('medium');
          s.value('中');
          s.margin('sm');
        });

        // Large
        section6.vSwitchers(s => {
          s.options(['小', '中', '大']);
          s.size('large');
          s.value('大');
          s.margin('md');
        });
      });

      // 7. 块级模式（占满容器）
      app.vBox(section7 => {
        section7.addClass('test-section');
        section7.vBox(label => {
          label.text('7. 块级模式');
          label.addClass('test-label');
        });
        section7.vSwitchers(s => {
          s.options(['首页', '发现', '消息', '我的']);
          s.value('首页');
          s.styles({ display: 'flex' });
          s._items.forEach(item => {
            item.style('flex', '1');
          });
        });
      });

      // 8. 在卡片中使用
      app.vBox(section8 => {
        section8.addClass('test-section');
        section8.vCard(card => {
          card.vCardHeader('时间范围选择');
          card.vCardBody(body => {
            body.vSwitchers(s => {
              s.options([
                { value: 'today', label: '今日' },
                { value: 'week', label: '近 7 天' },
                { value: 'month', label: '近 30 天' },
                { value: 'quarter', label: '近 90 天' },
              ]);
              s.value('week');
              s.onChange((value) => {
                console.log('时间范围：', value);
              });
            });
          });
        });
      });

      // 9. 自定义样式
      app.vBox(section9 => {
        section9.addClass('test-section');
        section9.vBox(label => {
          label.text('9. 自定义样式');
          label.addClass('test-label');
        });
        section9.vSwitchers(s => {
          s.options(['红色', '蓝色', '绿色']);
          s.value('红色');
          s.background('#f0f0f0');
          s.padding('sm');
        });
      });

      // 10. 动态更新选项
      app.vBox(section10 => {
        section10.addClass('test-section');
        section10.vBox(label => {
          label.text('10. 动态更新选项');
          label.addClass('test-label');
        });

        const switchersEl = section10.vSwitchers(s => {
          s.options(['选项 1', '选项 2', '选项 3']);
          s.value('选项 1');
          s.onChange((value) => {
            console.log('选中：', value);
          });
        });

        // 添加一个按钮来切换选项
        section10.vBox(btnBox => {
          btnBox.margin('sm');
          btnBox.styles({ display: 'flex', gap: '8px' });

          btnBox.vBox(btn1 => {
            btn1.text('切换为数字选项');
            btn1.background('var(--yoya-primary)');
            btn1.color('#fff');
            btn1.padding('sm');
            btn1.radius('sm');
            btn1.styles({ cursor: 'pointer', fontSize: '12px' });
            btn1.onClick(() => {
              switchersEl.options(['数字 1', '数字 2', '数字 3', '数字 4', '数字 5']);
            });
          });

          btnBox.vBox(btn2 => {
            btn2.text('切换回原文案');
            btn2.background('var(--yoya-bg)');
            btn2.color('var(--yoya-text-primary)');
            btn2.padding('sm');
            btn2.radius('sm');
            btn2.border('1px solid var(--yoya-border)');
            btn2.styles({ cursor: 'pointer', fontSize: '12px' });
            btn2.onClick(() => {
              switchersEl.options(['选项 1', '选项 2', '选项 3']);
            });
          });
        });
      });

    }).bindTo('#app');
  </script>
</body>
</html>
