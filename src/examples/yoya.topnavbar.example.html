<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTopNavbar 组件演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--yoya-bg, #f5f5f5);
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { vTopNavbar, vBody, toast, vButton } from '../yoya/index.js';

    // 创建顶部导航栏
    const navbar = vTopNavbar(nav => {
      nav.height('60px');

      // 设置 Logo
      nav.logo('🚀 Yoya', () => {
        toast.info('点击了 Logo');
      });

      // 添加导航项
      nav.item('首页', () => {
        toast.info('点击了首页');
      });

      nav.item('文档', () => {
        toast.info('点击了文档');
      });

      nav.item('组件', () => {
        toast.info('点击了组件');
      });

      nav.item('关于', () => {
        toast.info('点击了关于');
      });

      // 设置右侧操作区
      nav.right(r => {
        r.button('登录', () => {
          toast.info('点击了登录');
        });

        r.button('注册', () => {
          toast.success('点击了注册');
        });
      });
    });

    // 创建内容区域
    const content = vBody(b => {
      b.child(navbar);

      // 添加演示内容
      b.div(container => {
        container.styles({
          padding: '40px 20px',
          maxWidth: '1200px',
          margin: '0 auto',
        });

        container.h1('VTopNavbar 组件演示');

        container.p('这是一个顶部导航栏组件的演示页面。');

        container.div(card => {
          card.styles({
            background: 'var(--yoya-card-bg, #fff)',
            borderRadius: '8px',
            padding: '24px',
            marginTop: '24px',
            boxShadow: 'var(--yoya-card-shadow, 0 2px 8px rgba(0,0,0,0.1))',
          });

          card.h3('功能特性');

          container.ul(list => {
            list.styles({ paddingLeft: '20px', marginTop: '12px' });

            list.li('支持自定义高度');
            list.li('Logo 区域支持点击事件');
            list.li('导航项支持 hover 和 active 状态');
            list.li('右侧操作区支持按钮和分隔符');
            list.li('支持固定定位模式');
            list.li('支持暗黑模式');
          });
        });
      });
    });

    content.bindTo('#app');
  </script>
</body>
</html>
