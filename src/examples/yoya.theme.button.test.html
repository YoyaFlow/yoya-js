<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Based Theme Button 测试</title>
  <style>
    body {
      padding: 40px;
      font-family: sans-serif;
    }
    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      align-items: center;
    }
    .label {
      min-width: 80px;
      color: #666;
    }
    .section {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <h1>CSS-Based Theme Button 测试</h1>

  <div class="section">
    <h2>按钮类型</h2>
    <div class="row">
      <span class="label">Default:</span>
      <div id="btn-default"></div>
    </div>
    <div class="row">
      <span class="label">Primary:</span>
      <div id="btn-primary"></div>
    </div>
    <div class="row">
      <span class="label">Success:</span>
      <div id="btn-success"></div>
    </div>
    <div class="row">
      <span class="label">Warning:</span>
      <div id="btn-warning"></div>
    </div>
    <div class="row">
      <span class="label">Danger:</span>
      <div id="btn-danger"></div>
    </div>
  </div>

  <div class="section">
    <h2>Ghost 按钮</h2>
    <div class="row">
      <span class="label">Ghost Primary:</span>
      <div id="btn-ghost-primary"></div>
    </div>
    <div class="row">
      <span class="label">Ghost Success:</span>
      <div id="btn-ghost-success"></div>
    </div>
    <div class="row">
      <span class="label">Ghost Danger:</span>
      <div id="btn-ghost-danger"></div>
    </div>
  </div>

  <div class="section">
    <h2>按钮尺寸</h2>
    <div class="row">
      <span class="label">Small:</span>
      <div id="btn-small"></div>
    </div>
    <div class="row">
      <span class="label">Medium:</span>
      <div id="btn-medium"></div>
    </div>
    <div class="row">
      <span class="label">Large:</span>
      <div id="btn-large"></div>
    </div>
  </div>

  <div class="section">
    <h2>按钮状态</h2>
    <div class="row">
      <span class="label">Disabled:</span>
      <div id="btn-disabled"></div>
    </div>
    <div class="row">
      <span class="label">Loading:</span>
      <div id="btn-loading"></div>
    </div>
    <div class="row">
      <span class="label">Block:</span>
      <div id="btn-block" style="width: 300px;"></div>
    </div>
  </div>

  <script type="module">
    import { vButton, initTheme } from '../yoya/index.js';

    // 初始化主题
    initTheme({
      defaultTheme: 'islands',
      defaultMode: 'light'
    });

    // 按钮类型
    vButton(b => {
      b.text('Default');
    }).bindTo('#btn-default');

    vButton(b => {
      b.text('Primary');
      b.type('primary');
    }).bindTo('#btn-primary');

    vButton(b => {
      b.text('Success');
      b.type('success');
    }).bindTo('#btn-success');

    vButton(b => {
      b.text('Warning');
      b.type('warning');
    }).bindTo('#btn-warning');

    vButton(b => {
      b.text('Danger');
      b.type('danger');
    }).bindTo('#btn-danger');

    // Ghost 按钮
    vButton(b => {
      b.text('Ghost Primary');
      b.ghost(true);
      b.type('primary');
    }).bindTo('#btn-ghost-primary');

    vButton(b => {
      b.text('Ghost Success');
      b.ghost(true);
      b.type('success');
    }).bindTo('#btn-ghost-success');

    vButton(b => {
      b.text('Ghost Danger');
      b.ghost(true);
      b.type('danger');
    }).bindTo('#btn-ghost-danger');

    // 按钮尺寸
    vButton(b => {
      b.text('Small');
      b.size('small');
      b.type('primary');
    }).bindTo('#btn-small');

    vButton(b => {
      b.text('Medium');
      b.size('medium');
      b.type('primary');
    }).bindTo('#btn-medium');

    vButton(b => {
      b.text('Large');
      b.size('large');
      b.type('primary');
    }).bindTo('#btn-large');

    // 按钮状态
    vButton(b => {
      b.text('Disabled');
      b.disabled(true);
    }).bindTo('#btn-disabled');

    vButton(b => {
      b.text('Loading');
      b.loading(true);
      b.type('primary');
    }).bindTo('#btn-loading');

    vButton(b => {
      b.text('Block Button');
      b.block(true);
      b.type('primary');
    }).bindTo('#btn-block');

    console.log('Buttons created with CSS-based theme');
  </script>
</body>
</html>
