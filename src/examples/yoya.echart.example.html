<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya.Echart - ECharts 图表演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #fff;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    .header p {
      color: rgba(255,255,255,0.9);
      font-size: 1.1em;
    }

    .toolbar {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .toolbar button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .toolbar button.success {
      background: #28a745;
      color: #fff;
    }

    .toolbar button.warning {
      background: #ffc107;
      color: #333;
    }

    .toolbar button.danger {
      background: #dc3545;
      color: #fff;
    }

    .toolbar button.secondary {
      background: #6c757d;
      color: #fff;
    }

    .toolbar button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .toolbar button:active {
      transform: translateY(0);
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .chart-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .chart-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    }

    .chart-card.full-width {
      grid-column: 1 / -1;
    }

    .chart-header {
      padding: 16px 20px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chart-title {
      font-size: 1.1em;
      font-weight: 600;
      color: #333;
    }

    .chart-actions {
      display: flex;
      gap: 8px;
    }

    .chart-actions button {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid #ddd;
      background: #f8f9fa;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chart-actions button:hover {
      background: #667eea;
      color: #fff;
      border-color: #667eea;
    }

    .chart-body {
      padding: 20px;
    }

    /* 返回链接 */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    .back-link:hover {
      background: rgba(255,255,255,0.3);
    }

    /* 说明面板 */
    .info-panel {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      color: #fff;
    }

    .info-panel h3 {
      margin-bottom: 10px;
      font-size: 1.1em;
    }

    .info-panel ul {
      margin-left: 20px;
      line-height: 1.8;
    }

    .info-panel code {
      background: rgba(0,0,0,0.2);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="yoya.example.html" class="back-link">
      ← 返回演示中心
    </a>

    <div class="header">
      <h1>📊 Yoya.Echart</h1>
      <p>ECharts 图表集成组件 - 让数据可视化更简单</p>
    </div>

    <div class="info-panel">
      <h3>💡 使用说明</h3>
      <ul>
        <li>本演示使用 <code>ECharts 5.4.3</code> 版本</li>
        <li>通过 <code>echartsLib()</code> 方法传入 echarts 实例</li>
        <li>支持所有 ECharts 配置项</li>
        <li>支持主题切换、数据更新、加载状态等功能</li>
        <li>业务项目使用：<code>import { vEchart } from 'yoya-basic/dist/echart'</code></li>
      </ul>
    </div>

    <div class="toolbar">
      <button class="primary" onclick="updateAllData()">
        🔄 更新所有数据
      </button>
      <button class="success" onclick="showAllLoading()">
        ⏳ 显示加载
      </button>
      <button class="warning" onclick="hideAllLoading()">
        ✅ 隐藏加载
      </button>
      <button class="danger" onclick="clearAllCharts()">
        🗑️ 清空所有图表
      </button>
      <button class="secondary" onclick="toggleDarkMode()">
        🌙 切换暗色主题
      </button>
      <button class="primary" onclick="exportAllCharts()">
        📷 导出所有图表
      </button>
    </div>

    <div class="chart-grid" id="chartGrid"></div>
  </div>

  <!-- 引入 ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <script type="module">
    import { vEchart, div, flex } from '../yoya/index.js';

    // 存储所有图表实例
    window.chartInstances = {};

    // ==================== 柱状图 ====================
    window.barChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '销售统计', left: 'center', top: 10 },
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: { data: ['销售额', '利润', '成本'], bottom: 5 },
        grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
        xAxis: {
          type: 'category',
          data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日']
        },
        yAxis: { type: 'value' },
        series: [
          {
            name: '销售额',
            type: 'bar',
            data: [120, 200, 150, 80, 70, 110, 130],
            itemStyle: { color: '#667eea', borderRadius: [4, 4, 0, 0] }
          },
          {
            name: '利润',
            type: 'bar',
            data: [50, 80, 60, 30, 25, 50, 65],
            itemStyle: { color: '#764ba2', borderRadius: [4, 4, 0, 0] }
          },
          {
            name: '成本',
            type: 'bar',
            data: [70, 120, 90, 50, 45, 60, 65],
            itemStyle: { color: '#f093fb', borderRadius: [4, 4, 0, 0] }
          }
        ]
      });
    });

    // ==================== 折线图 ====================
    window.lineChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '温度变化趋势', left: 'center', top: 10 },
        tooltip: { trigger: 'axis' },
        legend: { data: ['最高温度', '最低温度'], bottom: 5 },
        grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00']
        },
        yAxis: { type: 'value', axisLabel: { formatter: '{value}°C' } },
        series: [
          {
            name: '最高温度',
            type: 'line',
            smooth: true,
            areaStyle: { opacity: 0.3 },
            data: [15, 13, 18, 25, 23, 20, 16],
            itemStyle: { color: '#f56c6c' }
          },
          {
            name: '最低温度',
            type: 'line',
            smooth: true,
            areaStyle: { opacity: 0.3 },
            data: [8, 6, 10, 15, 13, 11, 9],
            itemStyle: { color: '#409eff' }
          }
        ]
      });
    });

    // ==================== 饼图 ====================
    window.pieChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '市场份额分布', left: 'center', top: 10 },
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { orient: 'vertical', left: 'left', top: 'middle' },
        series: [{
          type: 'pie',
          radius: ['40%', '70%'],
          center: ['60%', '50%'],
          avoidLabelOverlap: true,
          itemStyle: {
            borderRadius: 10,
            borderColor: '#fff',
            borderWidth: 2
          },
          label: { show: false, position: 'center' },
          emphasis: {
            label: { show: true, fontSize: 18, fontWeight: 'bold' }
          },
          data: [
            { value: 1048, name: '搜索引擎', itemStyle: { color: '#667eea' } },
            { value: 735, name: '直接访问', itemStyle: { color: '#764ba2' } },
            { value: 580, name: '邮件营销', itemStyle: { color: '#f56c6c' } },
            { value: 484, name: '联盟广告', itemStyle: { color: '#f093fb' } },
            { value: 300, name: '视频广告', itemStyle: { color: '#409eff' } }
          ]
        }]
      });
    });

    // ==================== 雷达图 ====================
    window.radarChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '团队能力雷达图', left: 'center', top: 10 },
        tooltip: {},
        legend: { data: ['团队 A', '团队 B', '团队 C'], bottom: 5 },
        radar: {
          indicator: [
            { name: '销售能力', max: 100 },
            { name: '管理能力', max: 100 },
            { name: '技术能力', max: 100 },
            { name: '客服能力', max: 100 },
            { name: '研发能力', max: 100 },
            { name: '创新能力', max: 100 }
          ],
          radius: '65%'
        },
        series: [{
          type: 'radar',
          data: [
            {
              value: [85, 90, 75, 80, 95, 88],
              name: '团队 A',
              areaStyle: { color: 'rgba(102, 126, 234, 0.5)' },
              itemStyle: { color: '#667eea' }
            },
            {
              value: [70, 75, 90, 85, 80, 92],
              name: '团队 B',
              areaStyle: { color: 'rgba(245, 108, 108, 0.5)' },
              itemStyle: { color: '#f56c6c' }
            },
            {
              value: [90, 80, 85, 75, 70, 78],
              name: '团队 C',
              areaStyle: { color: 'rgba(64, 158, 255, 0.5)' },
              itemStyle: { color: '#409eff' }
            }
          ]
        }]
      });
    });

    // ==================== 面积图 ====================
    window.areaChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '销售进度', left: 'center', top: 10 },
        tooltip: { trigger: 'axis' },
        legend: { data: ['目标', '实际'], bottom: 5 },
        grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: ['1 月', '2 月', '3 月', '4 月', '5 月', '6 月']
        },
        yAxis: { type: 'value' },
        series: [
          {
            name: '目标',
            type: 'line',
            stack: '总量',
            areaStyle: { opacity: 0.3 },
            data: [100, 120, 140, 160, 180, 200],
            itemStyle: { color: '#909399' }
          },
          {
            name: '实际',
            type: 'line',
            stack: '总量',
            areaStyle: {},
            data: [80, 110, 130, 150, 170, 190],
            itemStyle: { color: '#67c23a' }
          }
        ]
      });
    });

    // ==================== 散点图 ====================
    window.scatterChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '用户分布', left: 'center', top: 10 },
        tooltip: {
          formatter: function (param) {
            return `用户：${param.data[2]}<br/>年龄：${param.data[0]}<br/>收入：${param.data[1]}k`;
          }
        },
        legend: { data: ['用户群'], bottom: 5 },
        grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
        xAxis: { name: '年龄', type: 'value', min: 0, max: 60 },
        yAxis: { name: '收入 (k)', type: 'value', min: 0, max: 100 },
        series: [{
          name: '用户群',
          type: 'scatter',
          symbolSize: function (data) {
            return Math.sqrt(data[1]) * 3;
          },
          data: [
            [25, 30, '用户 A'], [30, 45, '用户 B'], [35, 55, '用户 C'],
            [28, 38, '用户 D'], [40, 70, '用户 E'], [45, 80, '用户 F'],
            [32, 50, '用户 G'], [38, 60, '用户 H'], [22, 25, '用户 I'],
            [50, 85, '用户 J'], [27, 42, '用户 K'], [33, 52, '用户 L']
          ],
          itemStyle: {
            color: function () {
              const colors = ['#667eea', '#764ba2', '#f56c6c', '#f093fb', '#409eff', '#67c23a'];
              return colors[Math.floor(Math.random() * colors.length)];
            }
          }
        }]
      });
    });

    // ==================== K 线图 ====================
    window.klineChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '股票 K 线图', left: 'center', top: 10 },
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
        xAxis: {
          data: ['01-01', '01-02', '01-03', '01-04', '01-05', '01-06', '01-07', '01-08', '01-09', '01-10']
        },
        yAxis: { scale: true },
        series: [{
          type: 'candlestick',
          data: [
            [20, 22, 19, 23],
            [22, 25, 21, 26],
            [25, 27, 24, 28],
            [27, 26, 25, 29],
            [26, 28, 24, 30],
            [28, 30, 27, 31],
            [30, 29, 28, 32],
            [29, 31, 28, 33],
            [31, 33, 30, 34],
            [33, 35, 32, 36]
          ],
          itemStyle: {
            color: '#ef5350',
            color0: '#26a69a',
            borderColor: '#ef5350',
            borderColor0: '#26a69a'
          }
        }]
      });
    });

    // ==================== 仪表盘 ====================
    window.gaugeChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '业绩完成率', left: 'center', top: '70%' },
        series: [{
          type: 'gauge',
          progress: {
            show: true,
            width: 18,
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                { offset: 0, color: '#667eea' },
                { offset: 1, color: '#764ba2' }
              ])
            }
          },
          axisLine: { lineStyle: { width: 18 } },
          axisTick: { show: false },
          splitLine: { length: 15, lineStyle: { width: 2, color: '#999' } },
          axisLabel: { distance: 25, color: '#999', fontSize: 10 },
          anchor: {
            show: true,
            showAbove: true,
            size: 25,
            itemStyle: { borderWidth: 10 }
          },
          detail: {
            valueAnimation: true,
            fontSize: 30,
            offsetCenter: [0, '-20%'],
            formatter: '{value}%',
            color: '#333'
          },
          data: [{ value: 75, name: '完成度' }]
        }]
      });
    });

    // ==================== 漏斗图 ====================
    window.funnelChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '销售漏斗', left: 'center', top: 10 },
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { orient: 'vertical', left: 'left', top: 'middle' },
        series: [{
          name: '销售漏斗',
          type: 'funnel',
          left: '20%',
          width: '60%',
          minSize: '0%',
          maxSize: '100%',
          sort: 'descending',
          gap: 2,
          label: {
            show: true,
            position: 'inside',
            formatter: '{b}: {c}%'
          },
          itemStyle: {
            borderColor: '#fff',
            borderWidth: 2
          },
          data: [
            { value: 100, name: '访问', itemStyle: { color: '#667eea' } },
            { value: 80, name: '咨询', itemStyle: { color: '#764ba2' } },
            { value: 60, name: '意向', itemStyle: { color: '#f093fb' } },
            { value: 40, name: '成交', itemStyle: { color: '#409eff' } },
            { value: 20, name: '复购', itemStyle: { color: '#67c23a' } }
          ]
        }]
      });
    });

    // ==================== 词云图（用散点模拟） ====================
    window.wordChart = vEchart(chart => {
      chart.echartsLib(echarts);
      chart.height('350px');
      chart.option({
        title: { text: '热词分布', left: 'center', top: 10 },
        tooltip: { show: false },
        xAxis: { show: false, min: 0, max: 100 },
        yAxis: { show: false, min: 0, max: 100 },
        series: [{
          type: 'graph',
          layout: 'force',
          force: { repulsion: 800, gravity: 0.1, edgeLength: 100 },
          roam: true,
          label: {
            show: true,
            position: 'inside',
            fontSize: 14,
            formatter: '{b}'
          },
          data: [
            { name: '大数据', symbolSize: 80, value: 100, itemStyle: { color: '#667eea' } },
            { name: '人工智能', symbolSize: 70, value: 80, itemStyle: { color: '#764ba2' } },
            { name: '云计算', symbolSize: 60, value: 60, itemStyle: { color: '#f56c6c' } },
            { name: '物联网', symbolSize: 50, value: 50, itemStyle: { color: '#f093fb' } },
            { name: '区块链', symbolSize: 45, value: 45, itemStyle: { color: '#409eff' } },
            { name: '5G', symbolSize: 40, value: 40, itemStyle: { color: '#67c23a' } },
            { name: '边缘计算', symbolSize: 35, value: 35, itemStyle: { color: '#e6a23c' } },
            { name: '数字孪生', symbolSize: 30, value: 30, itemStyle: { color: '#909399' } },
            { name: '元宇宙', symbolSize: 55, value: 55, itemStyle: { color: '#e74c3c' } },
            { name: 'Web3.0', symbolSize: 42, value: 42, itemStyle: { color: '#3498db' } }
          ]
        }]
      });
    });

    // ==================== 渲染所有图表 ====================
    function renderCharts() {
      const grid = document.getElementById('chartGrid');

      const charts = [
        { title: '📊 销售统计', chart: window.barChart, actions: ['random', 'export'] },
        { title: '📈 温度趋势', chart: window.lineChart, actions: ['random', 'export'] },
        { title: '🥧 市场份额', chart: window.pieChart, actions: ['random', 'export'] },
        { title: '🎯 能力雷达', chart: window.radarChart, actions: ['random', 'export'] },
        { title: '📉 销售进度', chart: window.areaChart, actions: ['random', 'export'] },
        { title: '⚬ 用户分布', chart: window.scatterChart, actions: ['random', 'export'] },
        { title: '📊 K 线走势', chart: window.klineChart, actions: ['random', 'export'] },
        { title: '🎛️ 业绩完成', chart: window.gaugeChart, actions: ['random', 'export'] },
        { title: '🔻 销售漏斗', chart: window.funnelChart, actions: ['random', 'export'] },
        { title: '☁️ 热词分布', chart: window.wordChart, actions: ['random', 'export'] }
      ];

      charts.forEach((item, index) => {
        const card = div(card => {
          card.styles({ background: '#fff', borderRadius: '12px', overflow: 'hidden', boxShadow: '0 10px 40px rgba(0,0,0,0.2)' });

          // 头部
          card.child(div(header => {
            header.styles({ padding: '16px 20px', borderBottom: '2px solid #f0f0f0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' });

            header.child(div(title => {
              title.styles({ fontSize: '1.1em', fontWeight: '600', color: '#333' });
              title.text(item.title);
            }));

            header.child(div(actions => {
              actions.styles({ display: 'flex', gap: '8px' });

              item.actions.forEach(action => {
                if (action === 'random') {
                  actions.child(button(btn => {
                    btn.text('🔄 刷新');
                    btn.styles({ padding: '6px 12px', fontSize: '12px', border: '1px solid #ddd', background: '#f8f9fa', borderRadius: '6px', cursor: 'pointer' });
                    btn.on('click', () => updateChartData(item.chart));
                    btn.on('mouseenter', () => btn.styles({ background: '#667eea', color: '#fff', borderColor: '#667eea' }));
                    btn.on('mouseleave', () => btn.styles({ background: '#f8f9fa', color: '#333', borderColor: '#ddd' }));
                  }));
                } else if (action === 'export') {
                  actions.child(button(btn => {
                    btn.text('📷 导出');
                    btn.styles({ padding: '6px 12px', fontSize: '12px', border: '1px solid #ddd', background: '#f8f9fa', borderRadius: '6px', cursor: 'pointer' });
                    btn.on('click', () => exportChart(item.chart));
                    btn.on('mouseenter', () => btn.styles({ background: '#667eea', color: '#fff', borderColor: '#667eea' }));
                    btn.on('mouseleave', () => btn.styles({ background: '#f8f9fa', color: '#333', borderColor: '#ddd' }));
                  }));
                }
              });
            }));
          }));

          // 图表主体
          card.child(div(body => {
            body.styles({ padding: '20px' });
            body.child(item.chart);
          }));

          return card;
        });

        grid.appendChild(card.renderDom());

        // 保存图表引用
        const chartInstance = item.chart.getChartInstance();
        if (chartInstance) {
          window.chartInstances[item.title] = chartInstance;
        }
      });

      // 注册图表就绪回调
      charts.forEach(item => {
        item.chart.onChartReady(instance => {
          window.chartInstances[item.title] = instance;
        });
      });
    }

    // ==================== 全局操作函数 ====================

    // 更新所有数据
    window.updateAllData = function() {
      Object.values(window.chartInstances).forEach(chart => {
        if (chart && !chart.isDisposed()) {
          const option = chart.getOption();
          if (option && option.series) {
            option.series.forEach((series, index) => {
              if (series.data) {
                series.data = series.data.map(item => {
                  if (Array.isArray(item)) {
                    return item.map((v, i) => i === 0 || typeof v === 'number' ? Math.floor(Math.random() * 200) + 50 : v);
                  }
                  return typeof item === 'number' ? Math.floor(Math.random() * 200) + 50 : item;
                });
              }
            });
            chart.setOption(option, true);
          }
        }
      });
    };

    // 更新单个图表数据
    function updateChartData(chart) {
      const instance = chart.getChartInstance();
      if (instance && !instance.isDisposed()) {
        const option = instance.getOption();
        if (option && option.series) {
          option.series.forEach(series => {
            if (series.data) {
              series.data = series.data.map(item => {
                if (Array.isArray(item)) {
                  return item.map((v, i) => typeof v === 'number' ? Math.floor(Math.random() * 200) + 50 : v);
                }
                if (item && typeof item === 'object' && item.value !== undefined) {
                  item.value = Math.floor(Math.random() * 100);
                  return item;
                }
                return typeof item === 'number' ? Math.floor(Math.random() * 200) + 50 : item;
              });
            }
          });
          instance.setOption(option, true);
        }
      }
    }

    // 显示所有加载
    window.showAllLoading = function() {
      Object.values(window.chartInstances).forEach(chart => {
        if (chart && !chart.isDisposed()) {
          chart.showLoading({ text: '加载中...', color: '#667eea' });
        }
      });
    };

    // 隐藏所有加载
    window.hideAllLoading = function() {
      Object.values(window.chartInstances).forEach(chart => {
        if (chart && !chart.isDisposed()) {
          chart.hideLoading();
        }
      });
    };

    // 清空所有图表
    window.clearAllCharts = function() {
      Object.values(window.chartInstances).forEach(chart => {
        if (chart && !chart.isDisposed()) {
          chart.clear();
        }
      });
    };

    // 切换暗色主题
    window.toggleDarkMode = function() {
      const isDark = document.body.style.background.includes('#1a1a2e');
      if (isDark) {
        document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        Object.values(window.chartInstances).forEach(chart => {
          if (chart && !chart.isDisposed()) {
            chart.dispose();
          }
        });
        setTimeout(renderCharts, 100);
      } else {
        document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)';
        // 重新渲染图表（实际应用中应该重新初始化主题）
      }
    };

    // 导出单个图表
    function exportChart(chart) {
      const instance = chart.getChartInstance();
      if (instance && !instance.isDisposed()) {
        const url = instance.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#fff' });
        const a = document.createElement('a');
        a.href = url;
        a.download = 'chart-' + Date.now() + '.png';
        a.click();
      }
    }

    // 导出所有图表
    window.exportAllCharts = function() {
      Object.entries(window.chartInstances).forEach(([name, chart]) => {
        if (chart && !chart.isDisposed()) {
          setTimeout(() => {
            const url = chart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#fff' });
            const a = document.createElement('a');
            a.href = url;
            a.download = name.replace(/[^a-zA-Z0-9]/g, '_') + '.png';
            a.click();
          }, 100);
        }
      });
    };

    // 页面加载完成后渲染图表
    document.addEventListener('DOMContentLoaded', renderCharts);
    renderCharts();
  </script>
</body>
</html>
