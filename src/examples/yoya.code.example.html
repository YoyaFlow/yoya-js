<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya.Basic - VCode 组件演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: white;
      font-size: 36px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
    }

    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    .back-link:hover {
      background: rgba(255,255,255,0.3);
    }

    .demo-section {
      background: white;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .demo-area {
      padding: 30px;
    }

    .demo-area h2 {
      color: #333;
      font-size: 20px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #667eea;
    }

    .demo-area h3 {
      color: #666;
      font-size: 16px;
      margin: 20px 0 12px;
    }

    .token-comment { color: #6a9955; }
    .token-keyword { color: #569cd6; }
    .token-string { color: #ce9178; }
    .token-function { color: #dcdcaa; }
    .token-number { color: #b5cea8; }
    .token-property { color: #9cdcfe; }
    .token-operator { color: #d4d4d4; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/examples/yoya.example.html" class="back-link">← 返回首页</a>
      <h1>VCode 代码展示组件</h1>
      <p>支持语法高亮、复制代码功能</p>
    </div>

    <div id="app"></div>
  </div>

  <script type="module" src="./yoya.code.example.js"></script>
</body>
</html>
