<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTabs - IDEA 风格标签页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    .demo-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .demo-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }

    .demo-card-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .demo-card-body {
      padding: 0;
    }

    .tabs-container {
      height: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VTabs - IDEA 风格标签页组件</h1>
    <p class="subtitle">紧凑设计，激活标签与内容区域无缝衔接</p>

    <div class="demo-card">
      <div class="demo-card-header">
        <h2>基础用法</h2>
      </div>
      <div class="demo-card-body">
        <div id="app" class="tabs-container"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { vTabs, toast } from '../yoya/index.js';

    // 创建 VTabs 实例
    const tabs = vTabs(t => {
      // 设置可关闭
      t.setState('closable', true);

      // 添加标签页 - 模拟 IDEA 编辑器文件标签
      t.addTab('welcome', '🏠 欢迎', c => {
        c.div(d => {
          d.styles({
            padding: '24px',
            lineHeight: '1.6',
            color: '#333',
          });
          d.h2(h => {
            h.styles({ marginBottom: '16px', color: '#2563EB' });
            h.text('欢迎使用 Yoya.Basic');
          });
          d.p(p => {
            p.styles({ marginBottom: '12px' });
            p.text('这是一个 IDEA 风格的标签页组件，具有以下特点：');
          });
          d.ul(u => {
            u.styles({ marginLeft: '20px', marginBottom: '16px' });
            u.li('紧凑的标签设计');
            u.li('激活标签与内容无缝衔接');
            u.li('支持关闭按钮');
            u.li('支持图标');
            u.li('平滑的过渡动画');
          });
        });
      });

      t.addTab('file1', '📄 index.js', c => {
        c.div(d => {
          d.styles({ padding: '16px', fontFamily: 'monospace', fontSize: '13px' });
          d.pre(p => {
            p.styles({ background: '#f7f8fa', padding: '16px', borderRadius: '6px', overflow: 'auto' });
            p.text(`// index.js - 主入口文件
import { div, span } from '../yoya/index.js';

const app = div(d => {
  d.h1('Hello World');
  d.p('这是一个示例应用');
});

app.bindTo('#app');`);
          });
        });
      });

      t.addTab('file2', '🎨 styles.css', c => {
        c.div(d => {
          d.styles({ padding: '16px', fontFamily: 'monospace', fontSize: '13px' });
          d.pre(p => {
            p.styles({ background: '#f7f8fa', padding: '16px', borderRadius: '6px', overflow: 'auto' });
            p.text(`/* styles.css - 主题样式 */
:root {
  --yoya-primary: #2563EB;
  --yoya-bg: white;
  --yoya-text: #333;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
}`);
          });
        });
      });

      t.addTab('file3', '📦 package.json', c => {
        c.div(d => {
          d.styles({ padding: '16px', fontFamily: 'monospace', fontSize: '13px' });
          d.pre(p => {
            p.styles({ background: '#f7f8fa', padding: '16px', borderRadius: '6px', overflow: 'auto' });
            p.text(`{
  "name": "yoya.basic",
  "version": "1.0.0",
  "type": "module",
  "main": "./src/yoya/index.js"
}`);
          });
        });
      });

      t.addTab('file4', '📝 README.md', c => {
        c.div(d => {
          d.styles({ padding: '16px', lineHeight: '1.6' });
          d.h3('Yoya.Basic');
          d.p('一个浏览器原生的 HTML DSL 库。');
          d.h4('特性');
          d.ul(u => {
            u.styles({ marginLeft: '20px' });
            u.li('声明式语法');
            u.li('流式 API');
            u.li('无需构建工具');
            u.li('纯 ESM 模块');
          });
        });
      });

      // 标签变化回调
      t.onChange((id, tabData) => {
        console.log('标签切换:', id, tabData.title);
        toast.info(`切换到：${tabData.title}`);
      });
    });

    // 绑定到页面
    tabs.bindTo('#app');
  </script>
</body>
</html>
