<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBody 组件测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import {
      vBody,
      vButton,
      card,
      cardHeader,
      cardBody,
      cardFooter,
      h1,
      h2,
      p,
      div,
      createLightTheme,
      createDarkTheme,
      applyTheme,
    } from '../yoya/index.js';

    let isDark = false;

    // 创建 VBody 作为页面背景容器
    const body = vBody(b => {
      b.id('main-body');
      b.style('gap', '20px');

      // 页面标题区域
      b.child(
        div(header => {
          header.style('display', 'flex');
          header.style('justifyContent', 'space-between');
          header.style('alignItems', 'center');
          header.style('marginBottom', '20px');
          header.style('paddingBottom', '20px');
          header.style('borderBottom', '1px solid var(--islands-border, #e0e0e0)');

          header.child(
            h1(h => {
              h.text('VBody 组件测试');
              h.style('color', 'var(--islands-text, #333)');
            })
          );

          // 主题切换按钮
          header.child(
            vButton(btn => {
              btn.text('🌓 切换主题');
              btn.on('click', () => {
                isDark = !isDark;
                applyTheme(isDark ? createDarkTheme() : createLightTheme());
              });
            })
          );
        })
      );

      // 说明卡片
      b.child(
        card(c => {
          c.cardHeader(h => {
            h.text('组件说明');
          });
          c.cardBody(b => {
            b.child(
              p(p => {
                p.text('VBody 组件是用于页面整体背景区域的容器组件。它支持：');
                b.style('marginBottom', '10px');
              })
            );
            b.child(
              p(p => {
                p.html(`
                  <ul style="padding-left: 20px;">
                    <li>使用 CSS 变量 <code>--islands-body-bg</code> 支持主题切换</li>
                    <li>默认 <code>min-height: 100vh</code> 全屏高度</li>
                    <li>Flexbox 布局支持</li>
                    <li>链式 API 方法</li>
                  </ul>
                `);
              })
            );
          });
        })
      );

      // 示例卡片
      b.child(
        card(c => {
          c.cardHeader(h => {
            h.text('示例内容');
          });
          c.cardBody(b => {
            b.child(
              h2(h => {
                h.text('嵌套内容展示');
                h.style('marginBottom', '12px');
                h.style('fontSize', '18px');
              })
            );
            b.child(
              p(p => {
                p.text('这是一个嵌套在 VBody 中的卡片。当切换主题时，VBody 和 Card 的背景色都会自动跟随主题变化。');
                b.style('color', 'var(--islands-text-secondary, #666)');
              })
            );
          });
          c.cardFooter(f => {
            f.child(
              vButton(btn => {
                btn.text('主要操作');
                btn.style('marginRight', '8px');
              })
            );
            f.child(
              vButton(btn => {
                btn.text('次要操作');
                btn.style('background', 'var(--islands-bg-secondary, #f5f5f5)');
              })
            );
          });
        })
      );

      // 测试状态显示
      b.child(
        div(status => {
          status.id('status');
          status.style('padding', '12px');
          status.style('background', 'var(--islands-bg-secondary, #f5f5f5)');
          status.style('borderRadius', '6px');
          status.style('fontSize', '12px');
          status.style('color', 'var(--islands-text-secondary, #666)');
          status.text('当前主题：浅色模式');
        })
      );
    });

    // 绑定到 #app
    body.bindTo('#app');

    // 初始化浅色主题
    applyTheme(createLightTheme());

    // 监听主题变化
    window.addEventListener('theme-changed', (e) => {
      const status = document.getElementById('status');
      if (status) {
        const themeName = e.detail.theme.name;
        status.text('当前主题：' + (themeName.includes('dark') ? '深色模式' : '浅色模式'));
      }
    });
  </script>
</body>
</html>
