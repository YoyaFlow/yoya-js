<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya.Theme & I18n Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--islands-bg, #ffffff);
      color: var(--islands-text, #1a1a1a);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }
    #app {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #app.loaded {
      opacity: 1;
    }
    /* 加载指示器 */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 14px;
      color: var(--islands-text-secondary, #666);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">加载中...</div>
  </div>

  <script type="module">
    import './yoya.theme.example.js';

    // 应用加载完成后添加 loaded 类
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('app').classList.add('loaded');
      }, 100);
    });
  </script>
</body>
</html>
