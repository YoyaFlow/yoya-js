<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoya.Basic - Dashboard Decoration 实际应用场景</title>
  <style>
    :root {
      --yoya-primary: #667eea;
      --yoya-primary-light: #764ba2;
      --yoya-bg: #ffffff;
      --yoya-bg-secondary: #f0f2f5;
      --yoya-border: #e0e0e0;
      --yoya-border-light: #e5e5e7;
      --yoya-text-primary: #1a1c1f;
      --yoya-text-secondary: #6c757d;
      --yoya-success: #52c41a;
      --yoya-warning: #faad14;
      --yoya-danger: #ff4d4f;
      --yoya-info: #1890ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--yoya-bg-secondary);
      color: var(--yoya-text-primary);
      padding: 24px;
    }

    .demo-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--yoya-text-primary);
    }

    .demo-subtitle {
      font-size: 14px;
      color: var(--yoya-text-secondary);
      margin-bottom: 24px;
    }

    .section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--yoya-primary);
    }

    .section-icon {
      font-size: 24px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 1200px) {
      .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="../../yoya/theme/css/components/dashboard.css">
</head>
<body>
  <!-- 页面标题 -->
  <div style="padding: 24px 32px; margin-bottom: 32px;">
    <h1 class="demo-title">📊 Dashboard Decoration 实际应用场景</h1>
    <p class="demo-subtitle">展示装饰组件在数据大屏、监控面板、统计卡片等场景中的实际应用</p>
  </div>

  <!-- 场景 1: 数据概览卡片 -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">📈</span>
      <span class="section-title">场景 1: 数据概览卡片 - 使用 VPanel + VGlowBox</span>
    </div>
    <div id="scene1-stats"></div>
  </div>

  <!-- 场景 2: 服务器监控面板 -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">🖥️</span>
      <span class="section-title">场景 2: 服务器监控面板 - 使用 VTechBorder</span>
    </div>
    <div id="scene2-monitor"></div>
  </div>

  <!-- 场景 3: 销售数据报告 -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">💰</span>
      <span class="section-title">场景 3: 销售数据报告 - 使用 VTitleBar + VDivider</span>
    </div>
    <div id="scene3-report"></div>
  </div>

  <!-- 场景 4: 实时告警列表 -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">🔔</span>
      <span class="section-title">场景 4: 实时告警列表 - 使用 VCorner + VBorder</span>
    </div>
    <div id="scene4-alerts"></div>
  </div>

  <!-- 场景 5: 完整的数据大屏布局 -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">🎯</span>
      <span class="section-title">场景 5: 完整数据大屏 - 综合应用</span>
    </div>
    <div id="scene5-dashboard"></div>
  </div>

  <script type="module" src="./yoya.dashboard.decoration.usage.js"></script>
</body>
</html>
