<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VField 光标悬浮优化测试</title>
  <style>
    body { 
      font-family: sans-serif; 
      padding: 50px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container { 
      max-width: 800px; 
      margin: 0 auto; 
      background: white; 
      border-radius: 16px; 
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { 
      color: #333; 
      margin-bottom: 10px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 15px;
    }
    .description {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .demo-section {
      margin-bottom: 40px;
      padding: 25px;
      background: #f8f9fa;
      border-radius: 12px;
      border-left: 5px solid #667eea;
    }
    .demo-section h2 {
      color: #444;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 18px;
    }
    .field-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 15px;
    }
    .field-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .status {
      margin-top: 30px;
      padding: 15px;
      background: #e8f4fd;
      border-radius: 8px;
      border-left: 4px solid #2196f3;
    }
    .status h3 {
      margin-top: 0;
      color: #1976d2;
      font-size: 16px;
    }
    .status ul {
      margin: 10px 0;
      padding-left: 20px;
    }
    .status li {
      margin-bottom: 8px;
      color: #555;
    }
    .highlight {
      background: #fff3cd;
      padding: 3px 6px;
      border-radius: 4px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VField 光标悬浮优化测试</h1>
    <div class="description">
      测试 VField 组件的光标悬浮与移出特效优化效果。优化包括：平滑过渡、背景色变化、边框变化和阴影效果。
    </div>

    <div class="demo-section">
      <h2>基础字段测试</h2>
      <div class="field-label">鼠标悬浮在字段上查看效果：</div>
      <div class="field-row" id="basic-fields"></div>
    </div>

    <div class="demo-section">
      <h2>不同状态测试</h2>
      <div class="field-label">测试禁用状态和编辑状态：</div>
      <div class="field-row" id="state-fields"></div>
    </div>

    <div class="demo-section">
      <h2>自动保存字段测试</h2>
      <div class="field-label">测试自动保存模式：</div>
      <div class="field-row" id="auto-fields"></div>
    </div>

    <div class="status">
      <h3>优化特性验证</h3>
      <ul>
        <li><span class="highlight">平滑过渡</span>: 所有样式变化都有 0.2s 的过渡效果</li>
        <li><span class="highlight">视觉反馈</span>: 悬浮时显示浅色背景和边框</li>
        <li><span class="highlight">阴影效果</span>: 添加微妙的阴影提升层次感</li>
        <li><span class="highlight">编辑图标</span>: 悬浮时图标完全显示 (opacity: 1)</li>
        <li><span class="highlight">禁用状态</span>: 禁用时无悬浮效果，光标为 not-allowed</li>
      </ul>
    </div>
  </div>

  <script type="module">
    import { vField, vButton, toast } from './src/yoya/index.js';

    // 基础字段
    const basicFields = document.getElementById('basic-fields');
    
    // 用户名字段
    const nameField = vField(f => {
      f.showContent((container, value) => {
        container.text(value || '点击编辑用户名');
      });
      f.editContent((container, setValue) => {
        container.child(vInput(i => {
          i.placeholder('请输入用户名');
          i.value('张三');
          i.onInput((input) => {
            setValue(input.value());
          });
        }));
      });
      f.onSave((newValue) => {
        toast.success(`用户名已更新为：${newValue}`);
        return Promise.resolve();
      });
    });
    basicFields.appendChild(nameField._el);

    // 邮箱字段
    const emailField = vField(f => {
      f.showContent((container, value) => {
        container.text(value || 'user@example.com');
      });
      f.editContent((container, setValue) => {
        container.child(vInput(i => {
          i.placeholder('请输入邮箱');
          i.value('user@example.com');
          i.type('email');
          i.onInput((input) => {
            setValue(input.value());
          });
        }));
      });
      f.onSave((newValue) => {
        toast.success(`邮箱已更新为：${newValue}`);
        return Promise.resolve();
      });
    });
    basicFields.appendChild(emailField._el);

    // 不同状态字段
    const stateFields = document.getElementById('state-fields');
    
    // 禁用字段
    const disabledField = vField(f => {
      f.showContent((container, value) => {
        container.text('禁用字段（不可编辑）');
      });
      f.editContent((container, setValue) => {
        container.child(vInput(i => {
          i.placeholder('禁用状态');
          i.value('禁用');
        }));
      });
      f.disabled(true);
    });
    stateFields.appendChild(disabledField._el);

    // 自动保存字段
    const autoFields = document.getElementById('auto-fields');
    
    const autoField = vField(f => {
      f.autoSave(true);
      f.showContent((container, value) => {
        container.text(value || '自动保存字段');
      });
      f.editContent((container, setValue) => {
        container.child(vInput(i => {
          i.placeholder('输入后自动保存');
          i.value('自动保存');
          i.onInput((input) => {
            setValue(input.value());
          });
        }));
      });
      f.onSave((newValue) => {
        toast.info(`已自动保存：${newValue}`);
        return Promise.resolve();
      });
    });
    autoFields.appendChild(autoField._el);

    // 添加操作按钮
    const actions = document.createElement('div');
    actions.style.marginTop = '20px';
    actions.style.display = 'flex';
    actions.style.gap = '10px';
    actions.style.flexWrap = 'wrap';
    
    const enableBtn = vButton('启用禁用字段', b => {
      b.type('primary');
      b.size('small');
      b.on('click', () => {
        disabledField.disabled(false);
        toast.info('字段已启用');
      });
    });
    actions.appendChild(enableBtn._el);
    
    const disableBtn = vButton('禁用字段', b => {
      b.type('default');
      b.size('small');
      b.on('click', () => {
        disabledField.disabled(true);
        toast.info('字段已禁用');
      });
    });
    actions.appendChild(disableBtn._el);
    
    const editBtn = vButton('进入编辑模式', b => {
      b.type('success');
      b.size('small');
      b.on('click', () => {
        nameField.editing(true);
        toast.info('进入编辑模式');
      });
    });
    actions.appendChild(editBtn._el);
    
    stateFields.parentNode.appendChild(actions);

    // 控制台日志
    console.log('VField 光标悬浮优化测试已加载');
    console.log('优化特性：');
    console.log('1. 平滑过渡: all 0.2s ease');
    console.log('2. 视觉反馈: 背景色、边框、阴影');
    console.log('3. 编辑图标: opacity 0 → 1');
    console.log('4. 禁用状态: 无悬浮效果');

    // 辅助函数：创建输入框（因为 vInput 需要导入）
    function vInput(setup) {
      const input = document.createElement('input');
      input.type = 'text';
      input.style.padding = '6px 10px';
      input.style.border = '1px solid #ddd';
      input.style.borderRadius = '4px';
      input.style.fontSize = '14px';
      input.style.width = '200px';
      
      if (setup) {
        const mockInput = {
          placeholder: (text) => { input.placeholder = text; return mockInput; },
          value: (val) => { 
            if (val === undefined) return input.value;
            input.value = val; 
            return mockInput; 
          },
          type: (t) => { input.type = t; return mockInput; },
          onInput: (handler) => {
            input.addEventListener('input', () => handler(mockInput));
            return mockInput;
          }
        };
        setup(mockInput);
      }
      
      return input;
    }
  </script>
</body>
</html>
